<!doctype html>
<html lang="id">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Materi Trading</title>
  <meta name="description" content="Library belajar trading SMC/ICT yang terstruktur, bertahap, dan mudah di-review kembali.">
  <meta name="theme-color" content="#0f1117">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <div class="layout">
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-top">
        <a class="brand" href="#/">
          <span class="brand-badge">MT</span>
          <div>
            <strong>Materi Trading</strong>
            <span>GitHub Pages</span>
          </div>
        </a>
        <button class="icon-button mobile-only" id="closeSidebar" aria-label="Tutup navigasi">✕</button>
      </div>

      <div class="search-wrap">
        <input id="searchInput" type="search" placeholder="Cari judul atau isi materi..." autocomplete="off">
      </div>

      <nav id="nav" class="nav"></nav>

      <div class="sidebar-footer">
        <a href="https://github.com/suhaimitoamy/Materi-trading" target="_blank" rel="noreferrer">Buka repo</a>
      </div>
    </aside>

    <div class="overlay" id="overlay"></div>

    <main class="main">
      <header class="topbar">
        <button class="icon-button mobile-only" id="openSidebar" aria-label="Buka navigasi">☰</button>
        <div class="topbar-meta">
          <span class="eyebrow">Library Belajar Trading</span>
          <h1 id="pageTitle">Memuat materi...</h1>
        </div>
        <div class="topbar-actions">
          <a id="githubLink" class="button secondary" href="https://github.com/suhaimitoamy/Materi-trading" target="_blank" rel="noreferrer">GitHub</a>
        </div>
      </header>

      <section class="hero" id="hero">
        <div class="hero-card">
          <p class="eyebrow">Belajar bertahap</p>
          <h2>Dari fondasi sampai backtesting</h2>
          <p class="hero-copy">Semua folder dan bab dibaca langsung dari repo, jadi struktur situs mengikuti materi aslinya.</p>
          <div class="hero-stats" id="heroStats"></div>
        </div>
      </section>

      <article class="content-card">
        <div class="content-meta">
          <div id="breadcrumb" class="breadcrumb"></div>
          <div class="content-actions">
            <button id="toggleTheme" class="button ghost" type="button">Tema</button>
          </div>
        </div>
        <div id="content" class="content">
          <div class="loading">Memuat...</div>
        </div>
      </article>

      <nav class="pager" id="pager"></nav>
    </main>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/dompurify@3.2.6/dist/purify.min.js"></script>
  <script src="./app.js"></script>
</body>
</html>
